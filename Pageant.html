<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonhel Photography</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600&display=swap");

:root {
  --dark: #171717;
  --white: #fff;
  --max-width: 1200px;
  --header-font: "Merriweather", serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Montserrat", sans-serif;
}

/* SECTION */
.section__container {
  max-width: var(--max-width);
  margin: auto;
  padding: 5rem 1rem;
}

.section__header {
  text-align: center;
  font-size: 2rem;
  margin-bottom: 2rem;
  font-family: var(--header-font);
}

/* GRID */
.gallery__grid {
  display: grid;
  gap: 1rem;
  grid-template-columns: repeat(2, 1fr);
}

@media (min-width: 768px) {
  .gallery__grid { grid-template-columns: repeat(4, 1fr); }
}

@media (min-width: 1200px) {
  .gallery__grid { grid-template-columns: repeat(5, 1fr); }
}

/* IMAGE */
.gallery__item {
  border-radius: 8px;
  overflow: hidden;
}

.gallery__item img {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  cursor: pointer;
  display: block;
}

/* Desktop hover only */
@media (hover: hover) and (pointer: fine) {
  .gallery__grid:hover img:not(:hover) {
    opacity: 0.5;
  }
}

/* SKELETON */
.skeleton {
  aspect-ratio: 3 / 4;
  border-radius: 8px;
  background: linear-gradient(90deg,#e5e5e5 25%,#f5f5f5 37%,#e5e5e5 63%);
  background-size: 400% 100%;
  animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* BUTTON */
.gallery__btn {
  text-align: center;
  margin-top: 3rem;
}

.btn {
  padding: 0.75rem 1.5rem;
  background: var(--dark);
  color: var(--white);
  text-decoration: none;
  border-radius: 5px;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.lightbox__close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<section class="section__container">
  <h2 class="section__header">PAGEANT</h2>
  <div class="gallery__grid" id="gallery"></div>

  <div class="gallery__btn">
    <a href="index.html#myservices" class="btn">BACK</a>
  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox__close">&times;</span>
  <img id="lightboxImg">
</div>

<script>
const images = [
  "candidate1.jpg","candidate01girl.png","3.png","4.png",
  "5.png","6.png","7.png","8.png",
  "9.png","10.png","11.png","12.png",
  "13.png","14.png","15.jpg","16.jpg",
  "17.jpg","18.jpg","19.jpg","20.jpg",
  "21.jpg","22.jpg","22.jpg","23.jpg",
  "24.jpg","25.jpg","26.jpg","27.jpg",
  "28.jpg","29.jpg","30.jpg","31.jpg",
  "32.jpg","33.jpg","34.jpg","35.jpg",
  "36.jpg","37.jpg","38.jpg","39.jpg",
  "40.jpg","41.jpg", "42.jpg","43.jpg",
  "44.jpg","45.jpg", "46.jpg","47.jpg",
  "48.jpg","49.jpg", "50.jpg","51.jpg"
];

const gallery = document.getElementById("gallery");
const batch = 6;
let index = 0;

function loadImages() {
  for (let i = 0; i < batch && index < images.length; i++, index++) {
    const item = document.createElement("div");
    item.className = "gallery__item";

    const skeleton = document.createElement("div");
    skeleton.className = "skeleton";
    item.appendChild(skeleton);

    const img = new Image();
    img.src = `assets/pageant/${images[index]}`;
    img.loading = "lazy";

    img.onload = () => {
      item.innerHTML = "";
      item.appendChild(img);
    };

    img.onclick = () => openLightbox(img.src);
    gallery.appendChild(item);
  }
}

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) loadImages();
});

const sentinel = document.createElement("div");
gallery.after(sentinel);
observer.observe(sentinel);

/* LIGHTBOX */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.style.display = "flex";
}

function closeLightbox() {
  lightbox.style.display = "none";
  lightboxImg.src = "";
}

document.querySelector(".lightbox__close").onclick = closeLightbox;
lightbox.onclick = e => e.target !== lightboxImg && closeLightbox();

/* INIT */
loadImages();
</script>

</body>
</html>
